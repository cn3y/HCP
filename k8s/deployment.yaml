apiVersion: apps/v1
kind: Deployment
metadata:
  name: golf-handicap-tracker
  labels:
    app: golf-handicap-tracker
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: golf-handicap-tracker
  template:
    metadata:
      labels:
        app: golf-handicap-tracker
    spec:
      containers:
      - name: golf-handicap-tracker
        # GitHub Container Registry (GHCR) image
        image: ghcr.io/cn3y/hcp/frontend:latest
        # For specific version: ghcr.io/cn3y/hcp/frontend:1.2.3
        # For local build: your-registry/golf-handicap-tracker:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: false
      securityContext:
        fsGroup: 101
