apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pvc.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - deployment.yaml
  - service.yaml
  - ingress-traefik.yaml  # Traefik Ingress for Kubernetes

commonLabels:
  app: golf-handicap-tracker
  managed-by: kustomize

namespace: default

images:
  - name: your-registry/golf-handicap-tracker
    newTag: latest
