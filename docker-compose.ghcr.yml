version: '3.8'

# Docker Compose file using pre-built images from GitHub Container Registry (GHCR)
# This is useful for production deployments without needing to build images locally

services:
  # Backend API Server
  backend:
    image: ghcr.io/cn3y/hcp/backend:latest
    # For specific version, use: ghcr.io/cn3y/hcp/backend:1.2.3
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/golf-handicap.db
      - CORS_ORIGIN=http://localhost
      - NODE_ENV=production
    volumes:
      - golf-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - golf-network

  # Frontend (React + nginx)
  frontend:
    image: ghcr.io/cn3y/hcp/frontend:latest
    # For specific version, use: ghcr.io/cn3y/hcp/frontend:1.2.3
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - golf-network

networks:
  golf-network:
    driver: bridge

volumes:
  golf-data:
    driver: local

# Usage:
# ------
#
# 1. For public images (no login required):
#    docker-compose -f docker-compose.ghcr.yml up -d
#
# 2. For private images (login required):
#    echo $GITHUB_TOKEN | docker login ghcr.io -u USERNAME --password-stdin
#    docker-compose -f docker-compose.ghcr.yml up -d
#
# 3. Pull latest images:
#    docker-compose -f docker-compose.ghcr.yml pull
#
# 4. View logs:
#    docker-compose -f docker-compose.ghcr.yml logs -f
#
# 5. Stop services:
#    docker-compose -f docker-compose.ghcr.yml down
#
# Note: Change image tags from 'latest' to specific versions (e.g., '1.2.3')
#       for production deployments to ensure reproducible builds.
